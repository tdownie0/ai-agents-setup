services:
  backend:
    build:
      context: .
      target: development
    working_dir: /app
    command: pnpm run dev:server
    environment:
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - TEST_USER_ID=${TEST_USER_ID}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/backend/node_modules
      - /app/packages/database/node_modules
    ports:
      - "3000:3000"
    networks:
      - dev-network
      - supabase_network
    depends_on:
      - cache

  frontend:
    build:
      context: .
      target: development
    working_dir: /app
    command: pnpm run dev:client
    environment:
      - VITE_HOST=0.0.0.0
      - VITE_PORT=5173
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - VITE_API_URL=http://backend:3000
      - WATCHPACK_POLLING=true 
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/frontend/node_modules
    ports:
      - "5173:5173"
    networks:
      - dev-network
    depends_on:
      - backend

  mcp-gateway:
    image: docker/mcp-gateway:latest
    profiles: ["agent"]
    use_api_socket: true
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
    volumes:
      - ${LOCAL_MCP_REGISTRY}:/root/.docker/mcp
    command:
      - --transport=sse
      - --port=8811
      - --registry=/root/.docker/mcp/registry.yaml
    networks:
      - dev-network
      - supabase_network

  opencode:
    build:
      context: .
      dockerfile: Dockerfile.opencode
      args:
        - USER_ID=${UID:-1000}
        - GROUP_ID=${GID:-1000}
    user: "${UID:-1000}:${GID:-1000}"
    profiles: ["agent"]
    container_name: opencode_agent
    stdin_open: true
    tty: true
    working_dir: /app/model_md
    environment:
      - OPENCODE_CONFIG=/app/model_md/opencode.json
      - REDIS_URL=redis://cache:6379
      - GOOGLE_API_KEY=${GEMINI_API_KEY}
      - MCPGATEWAY_ENDPOINT=http://mcp-gateway:8811/sse
    volumes:
      - ..:/app
      - ~/.config/opencode:/home/devuser/.config/opencode
      - ~/.local/share/opencode:/home/devuser/.local/share/opencode
    networks:
      - dev-network
    depends_on:
      - mcp-gateway 

  cache:
    image: redis:alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - dev-network

volumes:
  redis_data:

networks:
  dev-network:
    driver: bridge
  supabase_network:
    external: true
    name: supabase_network_${PROJECT_NAME}
