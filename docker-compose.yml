services:
  app:
    build:
      context: .
      target: development
    command: sh -c "npm install && npm run dev"
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - VITE_HOST=0.0.0.0
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://cache:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - WATCHPACK_POLLING=true
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
      - "5173:5173"
    networks:
      - dev-network
      - supabase_network
    depends_on:
      - cache

  mcp-gateway:
    image: docker/mcp-gateway:latest
    use_api_socket: true
    volumes:
      - ${LOCAL_MCP_REGISTRY}:/root/.docker/mcp
    command:
      - --transport=sse
      - --port=8811
      - --registry=/root/.docker/mcp/registry.yaml
    networks:
      - dev-network

  opencode:
    build:
      context: .
      dockerfile: Dockerfile.opencode
      args:
        - USER_ID=${UID:-1000}
        - GROUP_ID=${GID:-1000}
    user: "${UID:-1000}:${GID:-1000}"
    profiles: ["agent"]
    container_name: opencode_agent
    stdin_open: true
    tty: true
    working_dir: /app/model_md
    environment:
      - OPENCODE_CONFIG=/app/model_md/opencode.json
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://cache:6379
      - GOOGLE_API_KEY=${GEMINI_API_KEY}
      - MCPGATEWAY_ENDPOINT=http://mcp-gateway:8811/sse
    volumes:
      - ..:/app
      - ~/.config/opencode:/home/devuser/.config/opencode
      - ~/.local/share/opencode:/home/devuser/.local/share/opencode
    networks:
      - dev-network
      - supabase_network
    depends_on:
      - mcp-gateway 

  cache:
    image: redis:alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - dev-network

volumes:
  redis_data:

networks:
  dev-network:
    driver: bridge
  supabase_network:
    external: true
    name: supabase_network_${PROJECT_NAME}
