services:
  db:
    image: supabase/postgres:17.6.1.106
    environment:
      - POSTGRES_PASSWORD=password
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - feature-net

  backend:
    build:
      context: ..
      dockerfile: ./infra/builds/Dockerfile
      target: development
    image: dev-base:latest
    container_name: ${BRANCH}-backend
    command: >
      sh -c "pnpm install --no-frozen-lockfile --store-dir=/pnpm-store && pnpm run dev:server"
    environment:
      - CI=true
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL:-postgres://postgres:password@db:5432/postgres}
      - TEST_USER_ID=${TEST_USER_ID}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - PNPM_CONFIG_STORE_DIR=/pnpm-store
    volumes:
      - ${HOST_WORKTREE_PATH}:/app
      - node_modules_feature:/app/node_modules
      - /app/apps/frontend/node_modules
      - /app/apps/backend/node_modules
      - /app/packages/database/node_modules
      - /app/apps/mcp-servers/mcp-database-service/node_modules
      - pnpm_store:/pnpm-store
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    networks:
      - feature-net
    depends_on:
      - db
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/', (res) => { if (res.statusCode === 200 || res.statusCode === 404) { process.exit(0); } else { process.exit(1); } }).on('error', () => process.exit(1))",
        ]
      interval: 20s
      timeout: 3s
      retries: 30
      start_period: 20s

  frontend:
    build:
      context: ..
      dockerfile: ./infra/builds/Dockerfile
      target: development
    image: dev-base:latest
    container_name: ${BRANCH}-frontend
    command: pnpm run dev:client
    environment:
      - CI=true
      - VITE_HOST=0.0.0.0
      - VITE_PORT=5173
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - PNPM_CONFIG_STORE_DIR=/pnpm-store
    volumes:
      - ${HOST_WORKTREE_PATH}:/app
      - node_modules_feature:/app/node_modules
      - /app/apps/frontend/node_modules
      - /app/apps/backend/node_modules
      - /app/packages/database/node_modules
      - /app/apps/mcp-servers/mcp-database-service/node_modules
      - pnpm_store:/pnpm-store
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    networks:
      - feature-net
    depends_on:
      backend:
        condition: service_healthy

networks:
  feature-net:
    driver: bridge
    name: ${BRANCH:-feature}_net

volumes:
  pnpm_store:
    external: true
  db_data:
    name: "db_data_${BRANCH:-feature}"
  node_modules_feature:
    name: "node_modules_${BRANCH}"
