services:
  backend:
    build:
      context: ..
      dockerfile: ./infra/builds/Dockerfile
      target: development
    image: dev-backend:latest
    working_dir: /app
    command: pnpm run dev:server
    environment:
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - TEST_USER_ID=${TEST_USER_ID}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - PNPM_CONFIG_STORE_DIR=/home/node/.pnpm-store
    volumes:
      - ..:/app
      - /app/node_modules
      - /app/apps/frontend/node_modules
      - /app/apps/backend/node_modules
      - /app/packages/database/node_modules
      - /app/apps/mcp-servers/mcp-database-service/node_modules
      - pnpm_store:/home/node/.pnpm-store
    ports:
      - "3000:3000"
    networks:
      - dev-network
      - supabase_network
    depends_on:
      - cache

  frontend:
    build:
      context: ..
      dockerfile: ./infra/builds/Dockerfile
      target: development
    image: dev-frontend:latest
    working_dir: /app
    command: pnpm run dev:client
    environment:
      - VITE_HOST=0.0.0.0
      - VITE_PORT=5173
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - WATCHPACK_POLLING=true
      - PNPM_CONFIG_STORE_DIR=/home/node/.pnpm-store
    volumes:
      - ..:/app
      - /app/node_modules
      - /app/apps/frontend/node_modules
      - /app/apps/backend/node_modules
      - /app/packages/database/node_modules
      - /app/apps/mcp-servers/mcp-database-service/node_modules
      - pnpm_store:/home/node/.pnpm-store
    ports:
      - "5173:5173"
    networks:
      - dev-network
    depends_on:
      - backend

  mcp-gateway:
    image: docker/mcp-gateway:latest
    profiles: ["agent"]
    restart: always
    use_api_socket: true
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
    volumes:
      - ${LOCAL_MCP_REGISTRY}:/root/.docker/mcp
    ports:
      - "127.0.0.1:8811:8811"
    command:
      - --transport=sse
      - --port=8811
      - --registry=/root/.docker/mcp/registry.yaml
    networks:
      - dev-network
      - supabase_network
      - observability-bridge

  orchestrator-worker:
    build:
      context: ..
      dockerfile: ./apps/mcp-servers/mcp-git-orchestrator/Dockerfile
      target: worker
    profiles: ["agent"]
    use_api_socket: true
    container_name: orchestrator-worker
    restart: always
    environment:
      - REDIS_HOST=cache
      - REDIS_PORT=6379
      - PROJECT_PARENT_PATH=${PROJECT_PARENT_PATH}
      - DBOS_SYSTEM_DATABASE_URL=${DATABASE_URL}
      - TEST_USER_ID=${TEST_USER_ID}
    volumes:
      - ../..:/app
      - ../apps/mcp-servers/mcp-git-orchestrator/:/opt/orchestrator
      - /opt/orchestrator/__pycache__
      - /opt/orchestrator/.venv
    networks:
      - dev-network
      - supabase_network
    depends_on:
      - cache

  antigravity:
    build:
      context: ..
      dockerfile: ./infra/builds/Dockerfile.agy
      args:
        - PROJECT_NAME=${PROJECT_NAME}
    profiles: ["agent"]
    container_name: antigravity_agent
    stdin_open: true
    tty: true
    working_dir: /app
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - MCPGATEWAY_ENDPOINT=http://mcp-gateway:8811/sse
    volumes:
      - ../..:/app
      - ..:/app/${PROJECT_NAME}:ro
      - ~/.config/antigravity:/home/devuser/.config/antigravity
      - ~/.gemini:/home/devuser/.gemini
    networks:
      - dev-network

  cache:
    image: redis:alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - dev-network

volumes:
  redis_data:
  pnpm_store:
    external: true
  node_modules:
  frontend_node_modules:
  backend_node_modules:
  db_node_modules:
  mcp_node_modules:
  sisyphus_store:

networks:
  dev-network:
    driver: bridge
  supabase_network:
    external: true
    name: supabase_network_supabase_${PROJECT_NAME}
  observability-bridge:
    external: true
