services:
  backend:
    build:
      context: ..
      dockerfile: ./infra/builds/Dockerfile
      target: development
    image: dev-base:latest
    working_dir: /app
    command: >
      sh -c "pnpm install --frozen-lockfile --store-dir=/pnpm-store && pnpm run dev:server"
    environment:
      - CI=true
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - TEST_USER_ID=${TEST_USER_ID}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - PNPM_CONFIG_STORE_DIR=/pnpm-store
    volumes:
      - ..:/app
      - main_node_modules:/app/node_modules
      - /app/apps/frontend/node_modules
      - /app/apps/backend/node_modules
      - /app/packages/database/node_modules
      - /app/apps/mcp-servers/mcp-database-service/node_modules
      - pnpm_store:/pnpm-store
    ports:
      - "3000:3000"
    networks:
      - dev-network
      - supabase_network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/', (res) => { if (res.statusCode === 200 || res.statusCode === 404) { process.exit(0); } else { process.exit(1); } }).on('error', () => process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 30
      start_period: 10s

  frontend:
    build:
      context: ..
      dockerfile: ./infra/builds/Dockerfile
      target: development
    image: dev-base:latest
    working_dir: /app
    command: pnpm run dev:client
    environment:
      - CI=true
      - VITE_HOST=0.0.0.0
      - VITE_PORT=5173
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - WATCHPACK_POLLING=true
      - PNPM_CONFIG_STORE_DIR=/pnpm-store
    volumes:
      - ..:/app
      - main_node_modules:/app/node_modules
      - /app/apps/frontend/node_modules
      - /app/apps/backend/node_modules
      - /app/packages/database/node_modules
      - /app/apps/mcp-servers/mcp-database-service/node_modules
      - pnpm_store:/pnpm-store
    ports:
      - "5173:5173"
    networks:
      - dev-network
    depends_on:
      backend:
        condition: service_healthy

  mcp-gateway:
    image: docker/mcp-gateway:latest
    profiles: ["agent-core"]
    restart: always
    use_api_socket: true
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
    volumes:
      - ${LOCAL_MCP_REGISTRY}:/root/.docker/mcp
    ports:
      - "127.0.0.1:8811:8811"
    command:
      - --transport=sse
      - --port=8811
      - --registry=/root/.docker/mcp/registry.yaml
    networks:
      - dev-network
      - supabase_network
      - observability-bridge

  orchestrator-worker:
    build:
      context: ..
      dockerfile: ./apps/mcp-servers/mcp-git-orchestrator/Dockerfile
      target: worker
    profiles: ["agent-core"]
    use_api_socket: true
    container_name: orchestrator-worker
    restart: always
    environment:
      - REDIS_HOST=cache
      - REDIS_PORT=6379
      - PROJECT_PARENT_PATH=${PROJECT_PARENT_PATH}
      - DBOS_SYSTEM_DATABASE_URL=${DATABASE_URL}
      - TEST_USER_ID=${TEST_USER_ID}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL:-${SUPABASE_URL}}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY:-${SUPABASE_ANON_KEY}}
    volumes:
      - ../..:/app
      - ../apps/mcp-servers/mcp-git-orchestrator/:/opt/orchestrator
      - /opt/orchestrator/__pycache__
      - /opt/orchestrator/.venv
    networks:
      - dev-network
      - supabase_network
    depends_on:
      - cache

  antigravity:
    build:
      context: ..
      dockerfile: ./infra/builds/Dockerfile.ai_cli
      target: agent-antigravity
      args:
        - PROJECT_NAME=${PROJECT_NAME}
    profiles: ["antigravity"]
    container_name: antigravity_agent
    stdin_open: true
    tty: true
    working_dir: /app
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - MCPGATEWAY_ENDPOINT=http://mcp-gateway:8811/sse
    volumes:
      - ../..:/app
      - ..:/app/${PROJECT_NAME}:ro
      - ~/.config/antigravity:/home/devuser/.config/antigravity
      - ~/.gemini:/home/devuser/.gemini
    networks:
      - dev-network
    depends_on:
      - mcp-gateway

  pi:
    build:
      context: ..
      dockerfile: ./infra/builds/Dockerfile.ai_cli
      target: agent-pi
      args:
        - PROJECT_NAME=${PROJECT_NAME}
    profiles: ["pi"]
    container_name: pi_agent
    stdin_open: true
    tty: true
    working_dir: /app/model_md
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - PI_CODING_AGENT_DIR=/home/node/.pi/agent
      - MCPGATEWAY_ENDPOINT=http://mcp-gateway:8811/sse
    volumes:
      - ../..:/app
      - ..:/app/${PROJECT_NAME}:ro
      - ~/.pi:/home/node/.pi
      - /app/${PROJECT_NAME}/.pi
    networks:
      - dev-network
    depends_on:
      - mcp-gateway

  opencode:
    build:
      context: ..
      dockerfile: ./infra/builds/Dockerfile.ai_cli
      target: agent-opencode
      args:
        - PROJECT_NAME=${PROJECT_NAME}
    profiles: ["opencode"]
    container_name: opencode_agent
    stdin_open: true
    tty: true
    working_dir: /app/model_md
    environment:
      - OPENCODE_CONFIG=/app/model_md/opencode.json
      - GOOGLE_API_KEY=${GEMINI_API_KEY}
      - MCPGATEWAY_ENDPOINT=http://mcp-gateway:8811/sse
    volumes:
      - ../..:/app
      - ..:/app/${PROJECT_NAME}:ro
      - omo_state:/app/${PROJECT_NAME}/.omo
      - ~/.config/opencode:/home/devuser/.config/opencode
      - ~/.local/share/opencode:/home/devuser/.local/share/opencode
    networks:
      - dev-network
    depends_on:
      - mcp-gateway

  cache:
    image: redis:alpine
    profiles: ["agent-core"]
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - dev-network

volumes:
  redis_data:
  pnpm_store:
    external: true
  main_node_modules:
  omo_state:

networks:
  dev-network:
    driver: bridge
  supabase_network:
    external: true
    name: supabase_network_supabase_${PROJECT_NAME}
  observability-bridge:
    external: true
