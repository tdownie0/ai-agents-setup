services:
  db:
    image: supabase/postgres:17.6.1.093
    environment:
      - POSTGRES_PASSWORD=password
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - ./.data/db_${BRANCH:-feature}:/var/lib/postgresql/data
    networks:
      - feature-net

  backend:
    build:
      context: .
      target: development
    image: dev-backend:latest
    command: pnpm run dev:server
    environment:
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL:-postgres://postgres:password@db:5432/postgres}
      - TEST_USER_ID=${TEST_USER_ID}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - PNPM_CONFIG_STORE_DIR=/root/.pnpm-store
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/frontend/node_modules
      - /app/apps/backend/node_modules
      - /app/packages/database/node_modules
      - /app/apps/mcp-servers/mcp-database-service/node_modules
      - pnpm_store:/root/.pnpm-store
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    networks:
      - feature-net
    depends_on:
      - db

  frontend:
    build:
      context: .
      target: development
    image: dev-frontend:latest
    command: pnpm run dev:client
    environment:
      - VITE_HOST=0.0.0.0
      - VITE_PORT=5173
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - PNPM_CONFIG_STORE_DIR=/root/.pnpm-store
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/frontend/node_modules
      - /app/apps/backend/node_modules
      - /app/packages/database/node_modules
      - /app/apps/mcp-servers/mcp-database-service/node_modules
      - pnpm_store:/root/.pnpm-store
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    networks:
      - feature-net
    depends_on:
      - backend

networks:
  feature-net:
    driver: bridge
    name: ${BRANCH:-feature}_net

volumes:
  pnpm_store:
    external: true
