version: "3"

dotenv: [".env"]

includes:
  db: ./tasks/db.yml
  obs: ./tasks/obs.yml
  mcp: ./tasks/mcp.yml
  feature: ./tasks/feature.yml

vars:
  AGENT_CORE: "agent-core"

tasks:
  up:
    desc: "Start the entire local dev environment"
    cmds:
      - task: db:up
      - task: obs:up
      - task: app:up

  down:
    desc: "Stop everything"
    cmds:
      - task: app:down
      - task: obs:down
      - task: db:down

  app:up:
    desc: "Start the full development stack"
    deps: [db:up, obs:up]
    vars:
      P_FLAG: '{{if .P}}--profile {{splitList " " .P | join " --profile "}}{{end}}'
    cmds:
      - docker compose --env-file .env -p {{.PROJECT_NAME}} -f infra/docker-compose.yml {{.P_FLAG}} up {{.CLI_ARGS}}

  app:down:
    vars:
      P_FLAG: '{{if .P}}--profile {{splitList " " .P | join " --profile "}}{{end}}'
    cmds:
      - docker compose --env-file .env -p {{.PROJECT_NAME}} {{.P_FLAG}} down {{.CLI_ARGS}}

  build:docker-assets:
    desc: "Build external volumes and networks used"
    cmds:
      - docker volume create pnpm_store
      - docker network create observability-bridge

  ai:up:
    desc: "Start AI CLI containers"
    vars:
      P_FLAG: '{{if .P}}--profile {{splitList " " .P | join " --profile "}}{{end}}'
    cmds:
      - docker compose --env-file .env -p {{.PROJECT_NAME}} -f infra/docker-compose.yml --profile {{.AGENT_CORE}} {{.P_FLAG}} up {{.CLI_ARGS}}

  ai:down:
    desc: "Bring down AI CLI container"
    vars:
      P_FLAG: "{{if .P}}--profile {{.P}}{{end}}"
      AI: "{{if .P}}{{.P}}{{end}}"
    cmds:
      - docker compose --env-file .env -p {{.PROJECT_NAME}} {{.P_FLAG}} down {{.AI}}
