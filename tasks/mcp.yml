version: "3"

tasks:
  build-ast:
    desc: Build AST service locally
    dir: apps/mcp-servers/mcp-ast-service
    cmds:
      - docker build -t ast-explorer:latest .

  build-db:
    desc: Build DB service from root
    dir: .
    cmds:
      - docker build -t supabase-manager:latest -f apps/mcp-servers/mcp-database-service/Dockerfile .

  build-git-orchestrator:
    desc: Build git-orchestrator from root
    dir: .
    cmds:
      - docker build --target mcp-server -t git-orchestrator:latest -f apps/mcp-servers/mcp-git-orchestrator/Dockerfile .

  build-servers:
    desc: Build all MCP server images
    cmds:
      - task: build-ast
      - task: build-db
      - task: build-git-orchestrator

  setup:
    desc: "Generate local MCP configuration files"
    cmds:
      - ./bin/mcp-gateway-setup/generate-mcp-gateway-files.sh
    env:
      DOCKER_MCP_ROOT: "{{.LOCAL_DOCKER_DESKTOP_CATALOG}}"
      TASKFILE_DATABASE_URL: "{{.TASKFILE_DATABASE_URL}}"
      PROJECT_PARENT_PATH: "{{.PROJECT_PARENT_PATH}}"
      PROJECT_PATH: "{{.PROJECT_PATH}}"

